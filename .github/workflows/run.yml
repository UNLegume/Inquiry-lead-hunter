name: Run Lead Hunter

on:
  schedule:
    - cron: '0 0,5,10,15 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GMAIL_DELEGATED_USER: ${{ secrets.GMAIL_DELEGATED_USER }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      GMAIL_CREDENTIALS_PATH: credentials/service_account.json
      SETTINGS_PATH: config/settings.yaml
      PROMPTS_PATH: config/prompts.yaml

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install .

      - name: Write Gmail credentials
        env:
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
        run: |
          mkdir -p credentials
          printenv GMAIL_CREDENTIALS_JSON > credentials/service_account.json

      - name: Run lead hunter
        run: inquiry-lead-hunter
