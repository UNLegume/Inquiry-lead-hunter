gmail:
  label_inquiry: "_filtered/processed"
  label_processed: "処理済"
  label_lead: "リード"
  max_results: 50

noise_filter:
  auto_reply_patterns:
    - "自動返信"
    - "自動応答"
    - "auto-reply"
    - "automatic reply"
    - "out of office"
    - "不在"
    - "noreply"
    - "no-reply"
    - "mailer-daemon"
  newsletter_patterns:
    - "配信停止"
    - "unsubscribe"
    - "メールマガジン"
    - "ニュースレター"
  bounce_patterns:
    - "delivery failed"
    - "delivery status"
    - "undeliverable"
    - "配信エラー"
  auto_confirm_body_patterns:
    - "このメールは自動"
    - "担当者より折り返し"
    - "担当者よりご連絡"
    - "担当より改めて"
    - "改めてご連絡"
    - "後ほどご連絡"
    - "このメールに心当たりがない"
    - "このメールは送信専用"
    - "送信専用のメールアドレス"
    - "このメールに返信しないで"
    - "このメールへの返信はできません"
    - "受付番号"
    - "お問い合わせ内容の確認"
    - "以下の内容で受け付け"
    - "以下の内容でお問い合わせ"
    - "お問い合わせフォーム"
  auto_confirm_min_matches: 2

keyword_filter:
  high_keywords:
    - "打ち合わせ"
    - "打合せ"
    - "ミーティング"
    - "商談"
    - "見積"
    - "お見積り"
    - "導入"
    - "検討"
    - "ご相談"
    - "詳しく"
    - "資料"
    - "デモ"
    - "トライアル"
    - "協業"
    - "案件"
    - "人材"
    - "要員"
    - "ご紹介"
  medium_keywords:
    - "興味"
    - "関心"
    - "質問"
    - "教えて"
    - "可能でしょうか"
    - "費用"
    - "料金"
    - "プラン"
    - "情報交換"
    - "ご提案"
  negative_keywords:
    - "営業お断り"
    - "不要"
    - "結構です"
    - "必要ありません"

keyword_weights:
  high: 30
  medium: 15

scoring:
  llm_threshold: 50
  notification_threshold: 60
