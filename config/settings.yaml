gmail:
  label_inquiry: "_filtered/processed"
  label_processed: "処理済"
  label_lead: "リード"
  max_results: 50

noise_filter:
  auto_reply_patterns:
    - "自動返信"
    - "自動応答"
    - "auto-reply"
    - "automatic reply"
    - "out of office"
    - "不在"
    - "noreply"
    - "no-reply"
    - "mailer-daemon"
  newsletter_patterns:
    - "配信停止"
    - "unsubscribe"
    - "メールマガジン"
    - "ニュースレター"
  bounce_patterns:
    - "delivery failed"
    - "delivery status"
    - "undeliverable"
    - "配信エラー"
  auto_confirm_body_patterns:
    # 受付・承認の表現
    - "承りました"
    - "受け付けました"
    - "受け付けいたしました"
    - "受付いたしました"
    - "お問い合わせを受け付け"
    - "お問い合わせを承り"
    # 担当者からの連絡予告
    - "担当者より"
    - "担当より"
    - "担当者から"
    - "営業日以内"
    - "折り返し"
    # 自動送信の表明
    - "自動返信"
    - "自動配信"
    - "自動送信"
    # 送信内容の確認・エコーバック
    - "内容は以下"
    - "以下のとおりです"
    - "以下の通りです"
    - "以下にて承り"
    - "ご入力いただきました内容"
    - "ご送信内容"
    - "送信されました"
    - "内容を確認"
    - "お問い合わせ内容の確認"
    - "以下の内容で受け付け"
    - "以下の内容でお問い合わせ"
    # 返信不可・注意事項
    - "心当たりがない場合"
    - "このメールは送信専用"
    - "送信専用のメールアドレス"
    - "このメールに返信しないで"
    - "このメールへの返信はできません"
    - "返信いただけません"
    - "お問い合わせフォーム"
    - "受付番号"
  auto_confirm_min_matches: 2

keyword_filter:
  high_keywords:
    - "打ち合わせ"
    - "打合せ"
    - "ミーティング"
    - "商談"
    - "見積"
    - "お見積り"
    - "導入"
    - "検討"
    - "ご相談"
    - "詳しく"
    - "資料"
    - "デモ"
    - "トライアル"
    - "協業"
    - "案件"
    - "人材"
    - "要員"
    - "ご紹介"
  medium_keywords:
    - "興味"
    - "関心"
    - "質問"
    - "教えて"
    - "可能でしょうか"
    - "費用"
    - "料金"
    - "プラン"
    - "情報交換"
    - "ご提案"
  negative_keywords:
    - "営業お断り"
    - "不要"
    - "結構です"
    - "必要ありません"

keyword_weights:
  high: 30
  medium: 15

scoring:
  llm_threshold: 50
  notification_threshold: 60
